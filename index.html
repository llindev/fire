<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>fire-calc</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #0c0c0c;
      --surface: #111111;
      --surface2: #161616;
      --border: #242424;
      --text: #c8c8c8;
      --text-muted: #505050;
      --accent: #4ade80;
      --accent-hover: #86efac;
      --green: #4ade80;
      --red: #f87171;
      --blue: #60a5fa;
      --purple: #c084fc;
      --cyan: #22d3ee;
      --pink: #f472b6;
      --yellow: #facc15;
      --orange: #fb923c;
    }

    body {
      font-family: 'Courier New', Courier, monospace;
      line-height: 1.5;
      color: var(--text);
      background: var(--bg);
      min-height: 100vh;
      font-size: 13px;
    }

    /* Header */
    .header {
      border-bottom: 1px solid var(--border);
      padding: 0.6rem 1.5rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .header-prompt {
      color: var(--accent);
      font-weight: bold;
    }

    .header h1 {
      font-size: 0.9375rem;
      font-weight: bold;
      color: var(--text);
      letter-spacing: 0.04em;
    }

    .header span {
      color: var(--text-muted);
      font-size: 0.8125rem;
    }

    /* Layout */
    .app {
      display: grid;
      grid-template-columns: 350px 1fr;
      height: calc(100vh - 38px);
    }

    /* Sidebar */
    .sidebar {
      border-right: 1px solid var(--border);
      overflow-y: auto;
      padding: 1rem 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }

    .section-title {
      font-size: 0.6875rem;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-muted);
      margin-bottom: 0.625rem;
    }

    .section-title::before { content: '[ '; }
    .section-title::after  { content: ' ]'; }

    /* Form controls */
    .field {
      margin-bottom: 0.5rem;
    }

    .field label {
      display: block;
      font-size: 0.6875rem;
      color: var(--text-muted);
      margin-bottom: 0.125rem;
    }

    .field input, .field select {
      width: 100%;
      padding: 0.3rem 0.5rem;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 0.8125rem;
      font-family: inherit;
      outline: none;
      transition: border-color 0.1s;
    }

    .field input:focus, .field select:focus {
      border-color: var(--accent);
      background: rgba(74, 222, 128, 0.02);
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.5rem;
    }

    .row-3 {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 0.5rem;
    }

    /* Asset cards */
    .asset-card {
      border: 1px solid var(--border);
      border-left-width: 2px;
      padding: 0.5rem 0.625rem;
      position: relative;
    }

    .asset-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.4rem;
    }

    .asset-card-header-left {
      display: flex;
      align-items: center;
      gap: 0.375rem;
    }

    .asset-dot {
      width: 7px;
      height: 7px;
      flex-shrink: 0;
    }

    .asset-card-title {
      font-size: 0.75rem;
      font-weight: bold;
      color: var(--text);
    }

    .btn-remove {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 0.875rem;
      line-height: 1;
      padding: 0.1rem 0.25rem;
      font-family: inherit;
      transition: color 0.1s;
    }

    .btn-remove:hover {
      color: var(--red);
    }

    /* Add asset button */
    .btn-add {
      width: 100%;
      padding: 0.3rem 0.5rem;
      background: transparent;
      border: 1px dashed var(--border);
      color: var(--text-muted);
      font-size: 0.75rem;
      font-family: inherit;
      cursor: pointer;
      text-align: left;
      transition: border-color 0.1s, color 0.1s;
    }

    .btn-add:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    /* Asset type menu */
    .asset-type-menu {
      display: none;
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 0.25rem 0;
      margin-top: 0.25rem;
    }

    .asset-type-menu.show {
      display: block;
    }

    .asset-type-option {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.275rem 0.625rem;
      border: none;
      background: transparent;
      color: var(--text-muted);
      font-size: 0.75rem;
      font-family: inherit;
      cursor: pointer;
      width: 100%;
      text-align: left;
      transition: background 0.08s, color 0.08s;
    }

    .asset-type-option:hover {
      background: var(--surface2);
      color: var(--text);
    }

    .asset-type-option .dot {
      width: 6px;
      height: 6px;
      flex-shrink: 0;
    }

    /* Main content */
    .main {
      overflow-y: auto;
      padding: 1rem 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    /* Summary row — single bordered strip */
    .summary-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      border: 1px solid var(--border);
    }

    .summary-card {
      padding: 0.75rem 1rem;
    }

    .summary-card + .summary-card {
      border-left: 1px solid var(--border);
    }

    .summary-label {
      font-size: 0.625rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 0.25rem;
    }

    .summary-value {
      font-size: 1.25rem;
      font-weight: bold;
      letter-spacing: -0.01em;
    }

    .summary-sub {
      font-size: 0.625rem;
      color: var(--text-muted);
      margin-top: 0.125rem;
    }

    .text-green  { color: var(--green); }
    .text-accent { color: var(--accent); }
    .text-blue   { color: var(--blue); }
    .text-purple { color: var(--purple); }
    .text-red    { color: var(--red); }

    /* Chart container */
    .chart-container {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 1rem;
      flex: 1;
      min-height: 400px;
      position: relative;
    }

    .chart-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.75rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    .chart-title {
      font-size: 0.625rem;
      font-weight: bold;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .chart-legend {
      display: flex;
      gap: 0.875rem;
      flex-wrap: wrap;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 0.25rem;
      font-size: 0.625rem;
      color: var(--text-muted);
    }

    .legend-dot {
      width: 6px;
      height: 6px;
    }

    .chart-wrap {
      position: relative;
      height: calc(100% - 36px);
      min-height: 350px;
    }

    /* Responsive */
    @media (max-width: 900px) {
      .app {
        grid-template-columns: 1fr;
        height: auto;
      }

      .sidebar {
        border-right: none;
        border-bottom: 1px solid var(--border);
      }

      .summary-row {
        grid-template-columns: repeat(2, 1fr);
      }

      .summary-card:nth-child(3) {
        border-left: none;
        border-top: 1px solid var(--border);
      }

      .summary-card:nth-child(4) {
        border-top: 1px solid var(--border);
      }
    }

    @media (max-width: 500px) {
      .summary-row {
        grid-template-columns: 1fr;
      }

      .summary-card + .summary-card {
        border-left: none;
        border-top: 1px solid var(--border);
      }

      .row, .row-3 {
        grid-template-columns: 1fr;
      }
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); }
  </style>
</head>
<body>

  <div class="header">
    <span class="header-prompt">$</span>
    <h1>fire-calc</h1>
    <span>—— simulate your path to financial independence</span>
  </div>

  <div class="app">
    <!-- Sidebar: inputs -->
    <div class="sidebar">

      <!-- Personal Info -->
      <div>
        <div class="section-title">personal info</div>
        <div class="row">
          <div class="field">
            <label for="currentAge">current-age</label>
            <input type="number" id="currentAge" value="30" min="18" max="80">
          </div>
        </div>
        <div class="field">
          <label for="inflation">inflation (%)</label>
          <input type="number" id="inflation" value="3" min="0" max="15" step="0.25">
        </div>
      </div>

      <!-- Expenses -->
      <div>
        <div class="section-title">expenses</div>
        <div id="expenseList"></div>
        <button class="btn-add" id="btnAddExpense">+ add-expense</button>
      </div>

      <!-- Assets -->
      <div>
        <div class="section-title">assets</div>
        <div id="assetList"></div>

        <button class="btn-add" id="btnAddAsset">+ add-asset</button>
        <div class="asset-type-menu" id="assetTypeMenu">
          <button class="asset-type-option" data-type="stocks">
            <span class="dot" style="background: var(--blue)"></span>
            stocks / index-funds
          </button>
          <button class="asset-type-option" data-type="bonds">
            <span class="dot" style="background: var(--cyan)"></span>
            bonds / fixed-income
          </button>
          <button class="asset-type-option" data-type="real_estate">
            <span class="dot" style="background: var(--green)"></span>
            real-estate
          </button>
          <button class="asset-type-option" data-type="savings">
            <span class="dot" style="background: var(--yellow)"></span>
            savings / cash
          </button>
          <button class="asset-type-option" data-type="retirement">
            <span class="dot" style="background: var(--purple)"></span>
            401k / ira
          </button>
          <button class="asset-type-option" data-type="crypto">
            <span class="dot" style="background: var(--pink)"></span>
            crypto
          </button>
          <button class="asset-type-option" data-type="custom">
            <span class="dot" style="background: var(--text-muted)"></span>
            custom-asset
          </button>
        </div>
      </div>
    </div>

    <!-- Main: chart + summary -->
    <div class="main">
      <div class="summary-row">
        <div class="summary-card">
          <div class="summary-label">net_worth</div>
          <div class="summary-value text-accent" id="finalNW">$0</div>
          <div class="summary-sub" id="finalNWSub">at age 100</div>
        </div>
        <div class="summary-card">
          <div class="summary-label">total_spent</div>
          <div class="summary-value text-green" id="totalSpent">—</div>
          <div class="summary-sub">cumulative (infl. adj.)</div>
        </div>
      </div>

      <div class="chart-container">
        <div class="chart-header">
          <div class="chart-title">net-worth-projection</div>
          <div class="chart-legend" id="chartLegend"></div>
        </div>
        <div class="chart-wrap">
          <canvas id="projectionChart"></canvas>
        </div>
      </div>
    </div>
  </div>

<script>
// ── Asset type definitions ──
const ASSET_TYPES = {
  stocks: {
    label: 'stocks / index-funds',
    color: '#60a5fa',
    defaults: { balance: 50000, monthly: 1000, returnRate: 10 }
  },
  bonds: {
    label: 'bonds / fixed-income',
    color: '#22d3ee',
    defaults: { balance: 10000, monthly: 500, returnRate: 5 }
  },
  real_estate: {
    label: 'real-estate',
    color: '#4ade80',
    defaults: { balance: 200000, monthly: 0, returnRate: 7 }
  },
  savings: {
    label: 'savings / cash',
    color: '#facc15',
    defaults: { balance: 20000, monthly: 500, returnRate: 4 }
  },
  retirement: {
    label: '401k / ira',
    color: '#c084fc',
    defaults: { balance: 60000, monthly: 1500, returnRate: 9 }
  },
  crypto: {
    label: 'crypto',
    color: '#f472b6',
    defaults: { balance: 5000, monthly: 200, returnRate: 15 }
  },
  custom: {
    label: 'custom-asset',
    color: '#505050',
    defaults: { balance: 0, monthly: 0, returnRate: 7 }
  }
};

// ── State ──
let assets = [];
let nextId = 1;
let expenses = [];
let nextExpenseId = 1;
let chart = null;
let chartMarkers = [];

// ── Vertical markers plugin ──
const verticalMarkersPlugin = {
  id: 'verticalMarkers',
  afterDraw(ch) {
    if (!chartMarkers.length) return;
    const { ctx, chartArea, scales } = ch;
    const xScale = scales.x;
    ctx.save();
    ctx.font = "9px 'Courier New', monospace";
    chartMarkers.forEach(marker => {
      const idx = ch.data.labels.indexOf(marker.age);
      if (idx < 0) return;
      const x = xScale.getPixelForValue(idx);
      // Vertical line
      ctx.beginPath();
      ctx.setLineDash([4, 3]);
      ctx.strokeStyle = marker.color + 'aa';
      ctx.lineWidth = 1;
      ctx.moveTo(x, chartArea.top);
      ctx.lineTo(x, chartArea.bottom);
      ctx.stroke();
      ctx.setLineDash([]);
      // Label pill
      const tw = ctx.measureText(marker.label).width;
      const pad = 3, bh = 13;
      const bx = Math.min(Math.max(x - tw / 2 - pad, chartArea.left), chartArea.right - tw - pad * 2);
      const by = chartArea.top + 5;
      ctx.fillStyle = '#111111';
      ctx.fillRect(bx, by, tw + pad * 2, bh);
      ctx.strokeStyle = marker.color + '99';
      ctx.lineWidth = 0.5;
      ctx.strokeRect(bx, by, tw + pad * 2, bh);
      ctx.fillStyle = marker.color;
      ctx.textAlign = 'left';
      ctx.textBaseline = 'middle';
      ctx.fillText(marker.label, bx + pad, by + bh / 2);
    });
    ctx.restore();
  }
};

// ── Persistence ──
const STORAGE_KEY = 'fire-calc-state';

function saveState() {
  const state = {
    currentAge: document.getElementById('currentAge').value,
    inflation: document.getElementById('inflation').value,
    assets,
    nextId,
    expenses,
    nextExpenseId
  };
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

function loadState() {
  const raw = localStorage.getItem(STORAGE_KEY);
  if (!raw) return;
  try {
    const state = JSON.parse(raw);
    if (state.currentAge != null) document.getElementById('currentAge').value = state.currentAge;
    if (state.inflation != null) document.getElementById('inflation').value = state.inflation;
    if (Array.isArray(state.assets)) assets = state.assets;
    if (state.nextId != null) nextId = state.nextId;
    if (Array.isArray(state.expenses)) {
      expenses = state.expenses;
      if (state.nextExpenseId != null) nextExpenseId = state.nextExpenseId;
    } else if (state.monthlyExpenses != null) {
      // Migrate from old single-expense format
      const currentAge = parseInt(state.currentAge) || 30;
      expenses = [{
        id: nextExpenseId++,
        label: 'living-expenses',
        amount: parseFloat(state.monthlyExpenses) || 4000,
        startAge: currentAge,
        endAge: 100
      }];
    }
  } catch (e) {
    // ignore corrupted state
  }
}

// ── DOM refs ──
const assetList = document.getElementById('assetList');
const btnAdd = document.getElementById('btnAddAsset');
const typeMenu = document.getElementById('assetTypeMenu');
const expenseList = document.getElementById('expenseList');

// ── Expense management ──
function addExpense() {
  const currentAge = parseInt(document.getElementById('currentAge').value) || 30;
  expenses.push({
    id: nextExpenseId++,
    label: 'expense',
    amount: 2000,
    startAge: currentAge,
    endAge: 100
  });
  renderExpenses();
  recalculate();
}

function removeExpense(id) {
  expenses = expenses.filter(e => e.id !== id);
  renderExpenses();
  recalculate();
}

function renderExpenses() {
  expenseList.innerHTML = expenses.map(e => `
    <div class="asset-card" style="margin-bottom: 0.4rem; border-left-color: var(--orange);">
      <div class="asset-card-header">
        <div class="asset-card-header-left">
          <span class="asset-dot" style="background: var(--orange)"></span>
          <input type="text" value="${e.label}" data-eid="${e.id}" data-field="label"
            style="background:transparent;border:none;color:var(--text);font-size:0.75rem;font-weight:bold;width:130px;outline:none;font-family:inherit;">
        </div>
        <button class="btn-remove" onclick="removeExpense(${e.id})">[x]</button>
      </div>
      <div class="row-3">
        <div class="field">
          <label>amount ($/mo)</label>
          <input type="number" value="${e.amount}" data-eid="${e.id}" data-field="amount" min="0" step="100">
        </div>
        <div class="field">
          <label>start-age</label>
          <input type="number" value="${e.startAge}" data-eid="${e.id}" data-field="startAge" min="0" max="120">
        </div>
        <div class="field">
          <label>end-age</label>
          <input type="number" value="${e.endAge}" data-eid="${e.id}" data-field="endAge" min="0" max="120">
        </div>
      </div>
    </div>
  `).join('');

  expenseList.querySelectorAll('input[data-eid]').forEach(input => {
    input.addEventListener('input', (e) => {
      const id = parseInt(e.target.dataset.eid);
      const field = e.target.dataset.field;
      const exp = expenses.find(x => x.id === id);
      if (!exp) return;
      if (field === 'label') {
        exp.label = e.target.value;
      } else {
        exp[field] = parseFloat(e.target.value) || 0;
      }
      recalculate();
    });
  });
}

document.getElementById('btnAddExpense').addEventListener('click', addExpense);

// ── Toggle asset type menu ──
btnAdd.addEventListener('click', () => {
  typeMenu.classList.toggle('show');
});

document.querySelectorAll('.asset-type-option').forEach(btn => {
  btn.addEventListener('click', () => {
    addAsset(btn.dataset.type);
    typeMenu.classList.remove('show');
  });
});

// ── Add asset ──
function addAsset(type) {
  const def = ASSET_TYPES[type];
  const currentAge = parseInt(document.getElementById('currentAge').value) || 30;
  const asset = {
    id: nextId++,
    type,
    label: def.label,
    color: def.color,
    balance: def.defaults.balance,
    monthly: def.defaults.monthly,
    contributionEndAge: currentAge + 20,
    returnRate: def.defaults.returnRate
  };
  assets.push(asset);
  renderAssets();
  recalculate();
}

// ── Remove asset ──
function removeAsset(id) {
  assets = assets.filter(a => a.id !== id);
  renderAssets();
  recalculate();
}

// ── Render asset cards ──
function renderAssets() {
  assetList.innerHTML = assets.map(a => `
    <div class="asset-card" style="margin-bottom: 0.4rem; border-left-color: ${a.color};">
      <div class="asset-card-header">
        <div class="asset-card-header-left">
          <span class="asset-dot" style="background: ${a.color}"></span>
          <span class="asset-card-title"><input type="text" value="${a.label}" data-id="${a.id}" data-field="label" style="background:transparent;border:none;color:var(--text);font-size:0.75rem;font-weight:bold;width:120px;outline:none;font-family:inherit;"></span>
        </div>
        <button class="btn-remove" onclick="removeAsset(${a.id})">[x]</button>
      </div>
      <div class="row-3">
        <div class="field">
          <label>balance ($)</label>
          <input type="number" value="${a.balance}" data-id="${a.id}" data-field="balance" min="0" step="1000">
        </div>
        <div class="field">
          <label>monthly ($)</label>
          <input type="number" value="${a.monthly}" data-id="${a.id}" data-field="monthly" min="0" step="100">
        </div>
        <div class="field">
          <label>return (%/yr)</label>
          <input type="number" value="${a.returnRate}" data-id="${a.id}" data-field="returnRate" min="-20" max="50" step="0.5">
        </div>
      </div>
      <div class="row-3">
        <div class="field" style="grid-column: 1 / -1;">
          <label>contrib-end age</label>
          <input type="number" value="${a.contributionEndAge ?? 100}" data-id="${a.id}" data-field="contributionEndAge" min="0" max="120" step="1" style="width:100%;">
        </div>
      </div>
    </div>
  `).join('');

  // Attach event listeners
  assetList.querySelectorAll('input[data-id]').forEach(input => {
    input.addEventListener('input', (e) => {
      const id = parseInt(e.target.dataset.id);
      const field = e.target.dataset.field;
      const asset = assets.find(a => a.id === id);
      if (!asset) return;
      if (field === 'label') {
        asset.label = e.target.value;
      } else {
        asset[field] = parseFloat(e.target.value) || 0;
      }
      recalculate();
    });
  });
}

// ── Projection engine ──
function computeProjection() {
  const currentAge = parseInt(document.getElementById('currentAge').value) || 30;
  const inflationRate = parseFloat(document.getElementById('inflation').value) || 3;

  const years = Math.max(100 - currentAge, 1);
  const totalMonths = years * 12;

  // Per-asset month-by-month projection WITH monthly expense deductions.
  // Expenses are deducted proportionally from all assets each month so the
  // compound growth is correctly reduced by spending.
  const assetMonthlyReturns = assets.map(a => Math.pow(1 + a.returnRate / 100, 1 / 12) - 1);
  const assetBalances = assets.map(a => a.balance);

  const assetTimelines = assets.map((asset, i) => ({ asset, values: [assetBalances[i]] }));
  const totalValues = [assetBalances.reduce((s, b) => s + b, 0)];

  // Cumulative inflation-adjusted expenses (for summary card)
  const cumulativeExpensesByMonth = [0];
  let cumExp = 0;

  // Debt tracking: accumulates when assets can't cover monthly expenses
  const debtTimeline = [0];
  let debt = 0;
  let assetsDepletedAge = null;

  for (let m = 1; m <= totalMonths; m++) {
    // Sum active expense items for this month, inflation-adjusted from currentAge
    const ageNow = currentAge + m / 12;
    const inflFactor = Math.pow(1 + inflationRate / 100, m / 12);
    const monthlyExp = expenses.reduce((sum, e) => {
      if (ageNow >= e.startAge && ageNow <= e.endAge) return sum + e.amount * inflFactor;
      return sum;
    }, 0);
    cumExp += monthlyExp;
    cumulativeExpensesByMonth.push(cumExp);

    // Apply returns + contributions to each asset
    for (let i = 0; i < assets.length; i++) {
      const endAge = assets[i].contributionEndAge ?? 100;
      const contrib = ageNow <= endAge ? assets[i].monthly : 0;
      assetBalances[i] = assetBalances[i] * (1 + assetMonthlyReturns[i]) + contrib;
    }

    // Deduct this month's expenses proportionally across all assets
    const totalAfterGrowth = assetBalances.reduce((s, b) => s + b, 0);
    if (totalAfterGrowth > 0 && monthlyExp > 0) {
      const deductFrac = Math.min(monthlyExp / totalAfterGrowth, 1);
      for (let i = 0; i < assets.length; i++) {
        assetBalances[i] = Math.max(0, assetBalances[i] * (1 - deductFrac));
      }
    }

    // Track uncovered expenses as debt
    if (monthlyExp > 0) {
      const covered = Math.min(monthlyExp, Math.max(0, totalAfterGrowth));
      const uncovered = monthlyExp - covered;
      if (uncovered > 0) {
        debt += uncovered;
        if (assetsDepletedAge === null) {
          assetsDepletedAge = currentAge + m / 12;
        }
      }
    }
    debtTimeline.push(debt);

    for (let i = 0; i < assets.length; i++) {
      assetTimelines[i].values.push(assetBalances[i]);
    }
    totalValues.push(assetBalances.reduce((s, b) => s + b, 0));
  }

  // Sample yearly for chart labels
  const labels = [];
  for (let y = 0; y <= years; y++) {
    labels.push(currentAge + y);
  }

  const yearlyAssetData = assetTimelines.map(tl => {
    const yearly = [];
    for (let y = 0; y <= years; y++) {
      yearly.push(tl.values[y * 12]);
    }
    return { label: tl.asset.label, color: tl.asset.color, data: yearly };
  });

  const yearlyTotal = [];
  const yearlyCumulativeExpenses = [];
  const yearlyExpenses = [];
  const yearlyDebt = [];
  for (let y = 0; y <= years; y++) {
    yearlyTotal.push(totalValues[y * 12]);
    yearlyCumulativeExpenses.push(cumulativeExpensesByMonth[y * 12]);
    yearlyExpenses.push(y === 0 ? 0 : cumulativeExpensesByMonth[y * 12] - cumulativeExpensesByMonth[(y - 1) * 12]);
    yearlyDebt.push(-debtTimeline[y * 12]); // negative for below-zero chart display
  }

  // Find first year where portfolio peaks (expenses exceed gross asset growth)
  let portfolioPeakAge = null;
  for (let y = 1; y <= years; y++) {
    if (yearlyTotal[y] < yearlyTotal[y - 1]) {
      portfolioPeakAge = currentAge + y;
      break;
    }
  }

  const finalNW = totalValues[totalMonths];
  const finalDebt = debt;
  const totalSpent = cumulativeExpensesByMonth[totalMonths];

  return {
    labels,
    yearlyAssetData,
    yearlyTotal,
    yearlyCumulativeExpenses,
    yearlyExpenses,
    yearlyDebt,
    finalNW,
    finalDebt,
    portfolioPeakAge,
    assetsDepletedAge,
    totalSpent,
    currentAge,
    years
  };
}

// ── Format currency ──
function fmt(n) {
  if (n >= 1e6) return '$' + (n / 1e6).toFixed(1) + 'M';
  if (n >= 1e3) return '$' + (n / 1e3).toFixed(0) + 'K';
  return '$' + Math.round(n).toLocaleString();
}

function fmtFull(n) {
  return '$' + Math.round(n).toLocaleString();
}

// ── Update summary cards ──
function updateSummary(proj) {
  const finalNWEl = document.getElementById('finalNW');
  const finalNWSubEl = document.getElementById('finalNWSub');

  if (proj.finalDebt > 0) {
    finalNWEl.textContent = '-' + fmt(proj.finalDebt);
    finalNWEl.className = 'summary-value text-red';
    const depletedAge = proj.assetsDepletedAge != null
      ? ` (out at ${Math.floor(proj.assetsDepletedAge)})`
      : '';
    finalNWSubEl.textContent = `debt by age 100${depletedAge}`;
  } else {
    finalNWEl.textContent = assets.length === 0 ? '$0' : fmt(proj.finalNW);
    finalNWEl.className = 'summary-value text-accent';
    finalNWSubEl.textContent = 'at age 100';
  }

  document.getElementById('totalSpent').textContent = fmt(proj.totalSpent);
}

// ── Render chart ──
function renderChart(proj) {
  const ctx = document.getElementById('projectionChart').getContext('2d');

  // Update markers (vertical lines) for key events
  chartMarkers = [];
  if (proj.portfolioPeakAge != null) {
    chartMarkers.push({
      age: proj.portfolioPeakAge,
      label: 'exp>growth',
      color: '#fb923c'
    });
  }
  if (proj.assetsDepletedAge != null) {
    chartMarkers.push({
      age: Math.floor(proj.assetsDepletedAge),
      label: 'assets=0',
      color: '#f87171'
    });
  }

  const datasets = [];

  // Stacked area datasets for each asset
  proj.yearlyAssetData.forEach((ad, i) => {
    datasets.push({
      label: ad.label,
      data: ad.data,
      backgroundColor: ad.color + '22',
      borderColor: ad.color,
      borderWidth: 1.5,
      stack: 'assets',
      fill: i === 0 ? 'origin' : '-1',
      pointRadius: 0,
      pointHitRadius: 8,
      tension: 0.3
    });
  });

  // Expenses dataset (annual spending line)
  if (proj.yearlyExpenses.some(v => v > 0)) {
    datasets.push({
      label: 'expenses',
      data: proj.yearlyExpenses,
      backgroundColor: 'transparent',
      borderColor: '#fb923c',
      borderWidth: 1.5,
      borderDash: [4, 3],
      fill: false,
      pointRadius: 0,
      pointHitRadius: 8,
      tension: 0.3
    });
  }

  // Debt dataset (below zero, red dashed)
  if (proj.finalDebt > 0) {
    datasets.push({
      label: 'debt-projection',
      data: proj.yearlyDebt,
      backgroundColor: '#f8717118',
      borderColor: '#f87171',
      borderWidth: 1.5,
      borderDash: [5, 3],
      fill: 'origin',
      pointRadius: 0,
      pointHitRadius: 8,
      tension: 0.3
    });
  }

  // Update legend
  const legendEl = document.getElementById('chartLegend');
  legendEl.innerHTML = '';
  proj.yearlyAssetData.forEach(ad => {
    legendEl.innerHTML += `<span class="legend-item"><span class="legend-dot" style="background:${ad.color}"></span>${ad.label}</span>`;
  });
  if (proj.yearlyExpenses.some(v => v > 0)) {
    legendEl.innerHTML += `<span class="legend-item"><span class="legend-dot" style="background:#fb923c"></span>expenses</span>`;
  }
  if (proj.finalDebt > 0) {
    legendEl.innerHTML += `<span class="legend-item"><span class="legend-dot" style="background:#f87171"></span>debt-projection</span>`;
  }

  if (chart) {
    chart.data.labels = proj.labels;
    chart.data.datasets = datasets;
    chart.update('none');
  } else {
    chart = new Chart(ctx, {
      type: 'line',
      data: { labels: proj.labels, datasets },
      plugins: [verticalMarkersPlugin],
      options: {
        responsive: true,
        maintainAspectRatio: false,
        interaction: {
          mode: 'index',
          intersect: false
        },
        plugins: {
          legend: { display: false },
          tooltip: {
            backgroundColor: '#111111',
            borderColor: '#242424',
            borderWidth: 1,
            titleColor: '#c8c8c8',
            bodyColor: '#505050',
            padding: 10,
            titleFont: { family: "'Courier New', monospace", size: 11 },
            bodyFont: { family: "'Courier New', monospace", size: 11 },
            callbacks: {
              title: (items) => `age ${items[0].label}`,
              label: (item) => {
                if (item.dataset.label === 'debt-projection') {
                  const v = -item.raw;
                  return v > 0 ? `  debt-projection: ${fmtFull(v)}` : null;
                }
                if (item.dataset.label === 'expenses') {
                  return item.raw > 0 ? `  expenses: ${fmtFull(item.raw)}/yr` : null;
                }
                return `  ${item.dataset.label}: ${fmtFull(item.raw)}`;
              }
            }
          }
        },
        scales: {
          x: {
            title: { display: true, text: 'age', color: '#505050',
              font: { family: "'Courier New', monospace", size: 11 } },
            ticks: { color: '#505050',
              font: { family: "'Courier New', monospace", size: 11 } },
            grid: { color: '#1c1c1c' }
          },
          y: {
            title: { display: true, text: 'value ($)', color: '#505050',
              font: { family: "'Courier New', monospace", size: 11 } },
            ticks: {
              color: '#505050',
              font: { family: "'Courier New', monospace", size: 11 },
              callback: (v) => fmt(v)
            },
            grid: { color: '#1c1c1c' },
            stacked: true
          }
        }
      }
    });
  }
}

// ── Recalculate everything ──
function recalculate() {
  saveState();
  const proj = computeProjection();
  updateSummary(proj);
  renderChart(proj);
}

// ── Listen to personal info changes ──
['currentAge', 'inflation'].forEach(id => {
  document.getElementById(id).addEventListener('input', recalculate);
});

// ── Load saved state then render ──
loadState();
// Seed default expense if none saved
if (expenses.length === 0) {
  const currentAge = parseInt(document.getElementById('currentAge').value) || 30;
  expenses.push({
    id: nextExpenseId++,
    label: 'living-expenses',
    amount: 4000,
    startAge: currentAge,
    endAge: 100
  });
}
renderExpenses();
renderAssets();
recalculate();
</script>
